<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Have a question or custom request? Send an enquiry to the Urban Brew & Donuts team, and we will get back to you soon.">
    <title>Enquiry | Urban Brew & Donuts</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="nav-container">
            <span class="logo">☕ Urban Brew</span>
            <nav>
                <a href="index.html">Home</a>
                <a href="about.html">About</a>
                <a href="products.html">Products</a>
                <a href="enquiry.html" class="active">Enquiry</a>
                <a href="contact.html">Contact</a>
            </nav>
        </div>
    </header>

    <div class="container">
        <div class="enquiry-container">
            <h2>Send us an Enquiry</h2>
            
            <div id="error-message" style="color: #ff3333; margin-bottom: 15px; font-weight: bold; min-height: 20px;"></div>
            
            <form id="enquiryForm">
                <div class="form-group">
                    <label for="email">Email Address:</label>
                    <input type="email" id="email" placeholder="e.g., thabo@example.com">
                </div>

                <div class="form-group">
                    <label for="message">Message:</label>
                    <textarea id="message" placeholder="Type your inquiry here..."></textarea>
                </div>

                <button type="submit">Submit Enquiry</button>
            </form>
        </div>

        <p class="footer-note">
            We will gladly look into your enquiries and get back to you soon. Your feedback helps us upgrade our services to meet your expectations.
        </p>
    </div>

    <footer>
        <p>&copy; 2026 Urban Brew & Donuts. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
